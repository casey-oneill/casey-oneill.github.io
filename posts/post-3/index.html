<body class="vh-100 d-flex flex-column">

    <nav class="navbar navbar-expand-lg border-bottom">
      <div class="container">

        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbar">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/research/">Research</a>
            </li>

            </li>
            <li class="nav-item">
              <a id="theme-toggle" class="nav-link" href="#">
                <i id="theme-icon" class="fa-solid fa-sun fa-lg"></i>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </header>
  <main class="container flex-grow-1 py-4">
    <h2>Fri Aug 01 2025 00:00:00 GMT+0000 (Coordinated Universal Time)</h2>
    <p><strong>August 2025:</strong> Presented our paper on neurotic robots, <a href="https://doi.org/10.1109/RO-MAN63969.2025.11217779">Help Me, I'm Feeling Down!</a>, at IEEE RO-MAN in Eindhoven, the Netherlands.</p>

  </main>
  <footer class="container py-4">
    <p class="text-center">Website by Casey O'Neill © 2026.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://kit.fontawesome.com/89f48befff.js" crossorigin="anonymous"></script>
  <script>
    (() => {
      'use strict'

      const getStoredTheme = () => localStorage.getItem('theme')
      const setStoredTheme = theme => localStorage.setItem('theme', theme)

      const getPreferredTheme = () => {
        const storedTheme = getStoredTheme()
        if (storedTheme) {
          return storedTheme
        }

        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
      }

      const setTheme = theme => {
        if (theme === 'auto') {
          document.documentElement.setAttribute('data-bs-theme', (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'))
        } else {
          document.documentElement.setAttribute('data-bs-theme', theme)
        }
      }

      setTheme(getPreferredTheme())

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        const storedTheme = getStoredTheme()
        if (storedTheme !== 'light' && storedTheme !== 'dark') {
          setTheme(getPreferredTheme())
        }
      })

      window.addEventListener('DOMContentLoaded', () => {
        // Initialize all tooltips on the page
        const tooltips = document.querySelectorAll('[data-bs-toggle="tooltip"]');
        tooltips.forEach(el => new bootstrap.Tooltip(el));
        
        // Initialize theme and theme toggle
        const themeToggle = document.querySelector('#theme-toggle')

        if (!themeToggle) {
          return
        }

        const setThemeIcon = theme => {
          document.querySelector('#theme-icon').className = theme === 'dark' ? 'fa-solid fa-sun fa-lg' : 'fa-solid fa-moon fa-lg'
        }

        setThemeIcon(getPreferredTheme())

        themeToggle.addEventListener('click', (event) => {
          event.preventDefault()

          const theme = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark'

          setStoredTheme(theme)
          setTheme(theme)
          setThemeIcon(theme)
        })
      })
    })()
  </script>
</body>

</html>
